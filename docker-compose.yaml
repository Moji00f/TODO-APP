services:
  mongodb:
    image: mongo:6-jammy
    container_name: mongodb
    ports:
      - 27017:27017
    volumes:
      -  mongodb_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin
    networks:
      - backend
  todo-api:
    image: todo-api:v1.1.0
    container_name: todo-api
    depends_on:
      - "mongodb"
    #env_file:
    #  - .env
    ports:
      - "4000:4000"
    environment:
      APP_PORT: 4000
      MONGODB_URI: mongodb://admin:admin@mongodb:27017/GoReact?authSource=admin&authMechanism=SCRAM-SHA-256
    networks:
      - backend

  frontend:
    image: todo-web:v1.2.0
    container_name: frontend
    ports:
      - 8080:80
    environment:
      VITE_API_URL: "http://api.goreact.local"
    volumes:
    - /root/TODO-APP/nginx/todo-web/frontend.conf:/etc/nginx/conf.d/default.conf
    networks:
      - backend
      - frontend

volumes:
  mongodb_data:
    driver: local

networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge
